name: PR Demo

on:
  pull_request:
    branches: [main]

jobs:
  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve demo config
        run: |
          DEMO_BASE_URL="${{ vars.DEMO_BASE_URL || '' }}"
          DEMO_READY_URL="${{ vars.DEMO_READY_URL || '' }}"
          DEMO_DEV_COMMAND="${{ vars.DEMO_DEV_COMMAND || '' }}"
          DEMO_OUTPUT_DIR="${{ vars.DEMO_OUTPUT_DIR || '' }}"

          if [ -z "$DEMO_BASE_URL" ]; then
            DEMO_BASE_URL="$(bun run --silent config -- --field baseUrl)"
          fi

          if [ -z "$DEMO_READY_URL" ]; then
            DEMO_READY_URL="$(bun run --silent config -- --field readyUrl)"
          fi

          if [ -z "$DEMO_DEV_COMMAND" ]; then
            DEMO_DEV_COMMAND="$(bun run --silent config -- --field devCommand)"
          fi

          if [ -z "$DEMO_OUTPUT_DIR" ]; then
            DEMO_OUTPUT_DIR="$(bun run --silent config -- --field outputDir)"
          fi

          if [ -z "$DEMO_OUTPUT_DIR" ]; then
            DEMO_OUTPUT_DIR="artifacts"
          fi

          if [ -z "$DEMO_READY_URL" ]; then
            DEMO_READY_URL="$DEMO_BASE_URL"
          fi

          echo "DEMO_BASE_URL=$DEMO_BASE_URL" >> $GITHUB_ENV
          echo "DEMO_READY_URL=$DEMO_READY_URL" >> $GITHUB_ENV
          echo "DEMO_OUTPUT_DIR=$DEMO_OUTPUT_DIR" >> $GITHUB_ENV
          echo "DEMO_DEV_COMMAND<<EOF" >> $GITHUB_ENV
          echo "$DEMO_DEV_COMMAND" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Start dev server
        run: |
          if [ -n "$DEMO_DEV_COMMAND" ]; then
            bash -lc "$DEMO_DEV_COMMAND" &
          fi

      - name: Wait for app
        run: |
          if [ -n "$DEMO_READY_URL" ]; then
            bunx wait-on "$DEMO_READY_URL" --timeout 60000
          fi

      - name: Build demo assets
        run: bun run demo -- --base-ref origin/main --output-dir $DEMO_OUTPUT_DIR ${DEMO_BASE_URL:+--base-url $DEMO_BASE_URL}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-demo-artifacts
          path: ${{ env.DEMO_OUTPUT_DIR }}/
          if-no-files-found: warn

      - name: Comment on PR
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run comment -- --output-dir $DEMO_OUTPUT_DIR
